<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steadymade AI OS Chat</title>
  <link rel="stylesheet" href="/vendor/xterm/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout" id="layout">
    <aside id="sidebar" class="sidebar">
      <div class="side-head">
        <button id="newChat" title="Start new conversation">+ New chat</button>
      </div>
      <input id="convSearch" placeholder="Search conversations…" autocomplete="off">
      <div id="convList" class="conv-list"></div>
    </aside>

    <div id="sidebarResize" class="sidebar-resize" role="separator" aria-orientation="vertical" aria-label="Resize sidebar"></div>

    <div class="main-col">
      <header class="topbar">
        <div id="chatHeader" class="top-left">
          <select id="agent" class="agent-select" title="Agent mode">
            <option value="danny">Danny — Orchestrator</option>
          </select>
        </div>
        <div id="cliHeader" class="cli-header hidden">
          <button id="termStart" type="button">Start</button>
          <div id="termSessions" class="term-sessions" role="tablist" aria-label="Terminal sessions"></div>
          <div id="termStatus" class="term-status" aria-live="polite"></div>
        </div>
        <div class="top-right">
          <div class="view-switch" role="tablist" aria-label="Main view">
            <button id="viewChat" class="view-btn active" data-view="chat" title="Chat view">Chat</button>
            <button id="viewCli" class="view-btn" data-view="cli" title="CLI view">CLI</button>
          </div>
          <label class="incog" title="No history, no memory writes — this conversation leaves no trace">
            <input type="checkbox" id="incognito"> INCOGNITO
          </label>
        </div>
      </header>

      <div id="stage" class="stage centered">
        <main id="chat" class="chat">
          <div class="welcome">
            <div class="w-label">STEADYMADE AI OS</div>
            <h1>Danny Chat</h1>
            <p>Danny is the default orchestrator. You can switch to direct specialist mode in the selector.</p>
          </div>
        </main>

        <section id="cliPanel" class="cli-panel hidden" aria-live="polite">
          <div class="terminal-stage">
            <div id="termEmpty" class="term-empty">No terminal session yet. Click Start to launch the current provider target.</div>
            <div id="terminalHost" class="terminal-host" aria-label="Embedded terminal"></div>
          </div>
        </section>

        <footer class="composer-wrap">
          <div class="composer">
            <textarea id="input" rows="1" placeholder="Message Danny…"></textarea>
            <div class="composer-right">
              <select id="model" title="Model">
                <option value="default">Default</option>
                <option value="sonnet">Sonnet</option>
                <option value="haiku">Haiku</option>
                <option value="opus">Opus</option>
              </select>
              <button id="send" class="send-btn" title="Send (Enter), newline (Shift+Enter)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h11M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
          <div class="statusline"><span id="status">ready</span><span id="sess"></span></div>
        </footer>
      </div>
    </div>
  </div>

  <script src="/vendor/xterm/xterm.js"></script>
  <script src="/vendor/xterm-addon-fit/addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
