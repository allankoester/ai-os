<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steadymade AI OS Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <div class="side-head">
        <button id="newChat" title="Start new conversation">+ New chat</button>
      </div>
      <input id="convSearch" placeholder="Search conversations…" autocomplete="off">
      <div id="convList" class="conv-list"></div>
    </aside>

    <div class="main-col">
      <header class="topbar">
        <div class="top-left">
          <select id="agent" class="agent-select" title="Agent mode">
            <option value="danny">Danny — Orchestrator</option>
          </select>
        </div>
        <div class="top-right">
          <label class="incog" title="No history, no memory writes — this conversation leaves no trace">
            <input type="checkbox" id="incognito"> INCOGNITO
          </label>
        </div>
      </header>

      <div id="stage" class="stage centered">
        <main id="chat" class="chat">
          <div class="welcome">
            <div class="w-label">STEADYMADE AI OS</div>
            <h1>Danny Chat</h1>
            <p>Danny is the default orchestrator. You can switch to direct specialist mode in the selector.</p>
          </div>
        </main>

        <footer class="composer-wrap">
          <div class="composer">
            <textarea id="input" rows="1" placeholder="Message Danny…"></textarea>
            <div class="composer-right">
              <select id="model" title="Model">
                <option value="default">Default</option>
                <option value="sonnet">Sonnet</option>
                <option value="haiku">Haiku</option>
                <option value="opus">Opus</option>
              </select>
              <button id="send" class="send-btn" title="Send (Enter), newline (Shift+Enter)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h11M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
          <div class="statusline"><span id="status">ready</span><span id="sess"></span></div>
        </footer>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
